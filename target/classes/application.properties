server.port=8080

# PostgreSQL - update with your credentials
spring.datasource.url=jdbc:postgresql://localhost:5432/sportslot_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# JWT - replace secret with any long random string (32+ chars)
jwt.secret=sportslot_super_secret_key_replace_this_in_production_2024
jwt.expiration=86400000

spring.application.name=sportslot-backend
